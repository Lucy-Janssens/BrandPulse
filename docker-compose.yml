services:
  mongo:
    image: mongo:latest
    container_name: brandpulse-mongo
    ports:
      - "27017:27017"
    volumes:
      - mongodb_data:/data/db
    restart: unless-stopped

  api:
    build: 
      context: ./api
    container_name: brandpulse-api
    ports:
      - "5050:5000"
    environment:
      - MONGO_URI=mongodb://mongo:27017/brandpulse
      - PORT=5000
    env_file:
      - .env
    depends_on:
      - mongo
    restart: unless-stopped

volumes:
  mongodb_data:
